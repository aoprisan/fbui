<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>fbui remote console</title>
<style>
  :root {
    --bg: #14161a; --panel: #1c1f25; --line: #2c313a;
    --text: #d7dbe2; --dim: #8a93a1; --accent: #4d9de0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 13px/1.45 system-ui, sans-serif; height: 100vh;
    display: flex; flex-direction: column;
  }
  header {
    padding: 8px 14px; border-bottom: 1px solid var(--line);
    display: flex; gap: 14px; align-items: baseline; flex: none;
  }
  header b { font-size: 14px; }
  header .dim { color: var(--dim); font-size: 12px; }
  #status { margin-left: auto; color: var(--dim); font-size: 12px; }
  main { flex: 1; display: flex; min-height: 0; }
  #screenwrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 16px; min-width: 0; outline: none; position: relative;
  }
  #screenwrap:focus-within #screenbox, #screenwrap:focus #screenbox {
    box-shadow: 0 0 0 2px var(--accent);
  }
  #screenbox { position: relative; line-height: 0; }
  #screen {
    max-width: 100%; max-height: calc(100vh - 90px);
    image-rendering: pixelated; cursor: crosshair;
    background: #000; border: 1px solid var(--line);
  }
  #hl {
    position: absolute; border: 1px solid var(--accent);
    background: rgba(77,157,224,.15); pointer-events: none; display: none;
  }
  #toast {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--line); border-radius: 6px;
    padding: 6px 12px; display: none; font-size: 12px;
  }
  aside {
    width: 320px; flex: none; border-left: 1px solid var(--line);
    display: flex; flex-direction: column; min-height: 0;
  }
  aside nav { display: flex; border-bottom: 1px solid var(--line); flex: none; }
  aside nav button {
    flex: 1; background: none; border: 0; color: var(--dim); padding: 8px;
    font: inherit; cursor: pointer; border-bottom: 2px solid transparent;
  }
  aside nav button.on { color: var(--text); border-bottom-color: var(--accent); }
  #panels { flex: 1; overflow: auto; padding: 10px; }
  #metrics { white-space: pre; font: 11px/1.5 ui-monospace, monospace; color: var(--dim); margin: 0; }
  .node { padding-left: 14px; }
  .node > .row {
    display: flex; gap: 6px; padding: 1px 4px; border-radius: 4px;
    cursor: default; align-items: baseline;
  }
  .node > .row:hover { background: var(--panel); }
  .row .nm { color: var(--text); }
  .row .geo { color: var(--dim); font-size: 11px; }
  .row .tag {
    font-size: 10px; color: var(--accent); border: 1px solid var(--accent);
    border-radius: 3px; padding: 0 3px;
  }
  #refresh {
    margin: 0 0 8px; background: var(--panel); color: var(--text);
    border: 1px solid var(--line); border-radius: 5px; padding: 4px 10px;
    font: inherit; cursor: pointer;
  }
  #refresh:hover { border-color: var(--accent); }
</style>
</head>
<body>
<header>
  <b>fbui</b><span class="dim">remote console</span>
  <span class="dim" id="hint">click the screen to type into it</span>
  <span id="status">connecting…</span>
</header>
<main>
  <div id="screenwrap" tabindex="0">
    <div id="screenbox">
      <img id="screen" alt="live screen">
      <div id="hl"></div>
    </div>
    <div id="toast"></div>
  </div>
  <aside>
    <nav>
      <button id="tab-tree" class="on">Widget tree</button>
      <button id="tab-metrics">Metrics</button>
    </nav>
    <div id="panels">
      <div id="tree-panel">
        <button id="refresh">Refresh tree</button>
        <div id="tree"></div>
      </div>
      <pre id="metrics" style="display:none"></pre>
    </div>
  </aside>
</main>
<script>
"use strict";
const token = new URLSearchParams(location.search).get("token");
const qs = p => token ? p + (p.includes("?") ? "&" : "?") + "token=" + encodeURIComponent(token) : p;
const $ = id => document.getElementById(id);
const screenEl = $("screen"), wrap = $("screenwrap"), hl = $("hl");
let scale = 1; // logical → device, from /tree

// ---- live screen ----------------------------------------------------------
let polling = null;
function startStream() {
  screenEl.src = qs("/stream");
  screenEl.onerror = () => {           // stream unsupported/broken: poll
    if (polling) return;
    polling = setInterval(() => { screenEl.src = qs("/screen.png?t=" + Date.now()); }, 500);
    screenEl.onerror = null;
  };
}
startStream();

// ---- input forwarding -----------------------------------------------------
function post(params) {
  fetch(qs("/input?" + params), { method: "POST" })
    .then(r => setStatus(r.ok ? "connected" : "error " + r.status))
    .catch(() => setStatus("disconnected"));
}
function setStatus(s) { $("status").textContent = s; }
fetch(qs("/metrics")).then(r => setStatus(r.ok ? "connected" : "error " + r.status))
  .catch(() => setStatus("disconnected"));

// Map a mouse event on the displayed image to device pixels.
function devXY(e) {
  const r = screenEl.getBoundingClientRect();
  const nx = screenEl.naturalWidth || r.width, ny = screenEl.naturalHeight || r.height;
  const x = (e.clientX - r.left) * nx / r.width;
  const y = (e.clientY - r.top) * ny / r.height;
  return "x=" + x.toFixed(1) + "&y=" + y.toFixed(1);
}
let lastMove = 0;
screenEl.addEventListener("mousemove", e => {
  const now = performance.now();
  if (now - lastMove < 33) return;     // ~30 Hz is plenty for hover
  lastMove = now;
  post("type=move&" + devXY(e));
});
const btn = e => e.button === 1 ? "middle" : e.button === 2 ? "right" : "left";
screenEl.addEventListener("mousedown", e => {
  wrap.focus();
  post("type=down&button=" + btn(e) + "&" + devXY(e));
  e.preventDefault();
});
screenEl.addEventListener("mouseup", e => post("type=up&button=" + btn(e) + "&" + devXY(e)));
screenEl.addEventListener("contextmenu", e => e.preventDefault());
screenEl.addEventListener("wheel", e => {
  post("type=wheel&dy=" + (e.deltaY / 100).toFixed(2) + "&" + devXY(e));
  e.preventDefault();
}, { passive: false });

// Keyboard: forwarded only while the screen area has focus. Escape exits the
// app (the runner's global quit key), so require a double-press.
const NAMED = { Enter: "Enter", Backspace: "Backspace", Tab: "Tab", Delete: "Delete",
  Home: "Home", End: "End", ArrowLeft: "Left", ArrowRight: "Right",
  ArrowUp: "Up", ArrowDown: "Down", Escape: "Escape", " ": "Space" };
let escArmed = 0;
wrap.addEventListener("keydown", e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;   // leave browser shortcuts alone
  let key = null;
  if (e.key in NAMED) key = NAMED[e.key];
  else if (e.key.length === 1) key = e.key;
  if (!key) return;
  e.preventDefault();
  if (key === "Escape") {
    const now = performance.now();
    if (now - escArmed > 1000) {
      escArmed = now;
      toast("Esc exits the app — press again to send it");
      return;
    }
  }
  post("type=key&key=" + encodeURIComponent(key));
});
let toastTimer = null;
function toast(msg) {
  const t = $("toast");
  t.textContent = msg; t.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = "none"; }, 1500);
}

// ---- widget tree ----------------------------------------------------------
function loadTree() {
  fetch(qs("/tree")).then(r => r.json()).then(doc => {
    scale = doc.scale || 1;
    const root = $("tree");
    root.textContent = "";
    if (doc.tree) root.appendChild(renderNode(doc.tree));
  }).catch(() => { $("tree").textContent = "tree unavailable"; });
}
function renderNode(n) {
  const el = document.createElement("div");
  el.className = "node";
  const row = document.createElement("div");
  row.className = "row";
  const nm = document.createElement("span");
  nm.className = "nm"; nm.textContent = n.name;
  row.appendChild(nm);
  const geo = document.createElement("span");
  geo.className = "geo";
  geo.textContent = n.bounds.map(v => Math.round(v)).join(",");
  row.appendChild(geo);
  if (n.focused) row.appendChild(tag("focus"));
  else if (n.focusable) row.appendChild(tag("focusable"));
  row.addEventListener("mouseenter", () => highlight(n.bounds));
  row.addEventListener("mouseleave", () => { hl.style.display = "none"; });
  el.appendChild(row);
  for (const c of n.children || []) el.appendChild(renderNode(c));
  return el;
}
function tag(text) {
  const t = document.createElement("span");
  t.className = "tag"; t.textContent = text;
  return t;
}
function highlight(b) {
  const r = screenEl.getBoundingClientRect();
  const nx = screenEl.naturalWidth || 1;
  const k = r.width / nx * scale;      // logical px → displayed px
  hl.style.left = (b[0] * k) + "px";
  hl.style.top = (b[1] * k) + "px";
  hl.style.width = (b[2] * k) + "px";
  hl.style.height = (b[3] * k) + "px";
  hl.style.display = "block";
}
$("refresh").addEventListener("click", loadTree);
loadTree();

// ---- metrics --------------------------------------------------------------
function loadMetrics() {
  if ($("metrics").style.display === "none") return;
  fetch(qs("/metrics")).then(r => r.text())
    .then(t => { $("metrics").textContent = t.split("\n").filter(l => l && !l.startsWith("#")).join("\n"); })
    .catch(() => {});
}
setInterval(loadMetrics, 2000);
$("tab-tree").addEventListener("click", () => switchTab(true));
$("tab-metrics").addEventListener("click", () => { switchTab(false); loadMetrics(); });
function switchTab(tree) {
  $("tree-panel").style.display = tree ? "" : "none";
  $("metrics").style.display = tree ? "none" : "";
  $("tab-tree").classList.toggle("on", tree);
  $("tab-metrics").classList.toggle("on", !tree);
}
</script>
</body>
</html>
